<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, orientation=landscape">
  <title>英雄召喚 — 三國喵喵</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/gacha.css">
</head>
<body class="gacha-page">

  <!-- Navbar -->
  <header class="top-bar gacha-topbar">
    <button class="btn-ghost" onclick="location.href='index.html'">← 返回</button>
    <span class="gacha-topbar-title">英雄召喚</span>
    <span class="scroll-display">
      <img src="assets/gacha/icon_scroll.png" class="scroll-icon" alt="">
      <span id="g-scrolls">0</span> 卷
    </span>
  </header>

  <!-- Loading state -->
  <div id="gacha-loading" class="gacha-loading">
    <div class="loading-spinner">載入中…</div>
  </div>

  <!-- Main gacha content (2-column landscape) -->
  <div id="gacha-main" class="gacha-main hidden">

    <!-- Left: Summon platform -->
    <aside class="summon-panel">
      <div class="summon-stage">
        <img src="assets/gacha/summon_circle.png" class="summon-circle" alt="">
        <img src="assets/gacha/gacha_scroll.png" class="summon-scroll" alt="">
      </div>

      <div class="pity-bar">
        <div class="pity-bar-header">
          <span class="pity-label">稀有保底進度</span>
          <span id="pity-count" class="pity-count">距保底 40 抽</span>
        </div>
        <div class="pity-track">
          <div id="pity-fill" class="pity-fill"></div>
        </div>
      </div>

      <div class="draw-buttons">
        <button class="draw-btn single" id="btn-draw-1">
          <span class="draw-label">單抽</span>
          <span class="draw-cost">召喚令 × 5</span>
        </button>
        <button class="draw-btn multi" id="btn-draw-10">
          <span class="draw-badge">省 5 卷</span>
          <span class="draw-label">十連召喚</span>
          <span class="draw-cost">召喚令 × 45</span>
        </button>
      </div>
    </aside>

    <!-- Right: Hero collection + fragments -->
    <main class="collection-panel">
      <section class="hero-pool-section">
        <h2 class="section-title">
          <img src="assets/gacha/icon_hero.png" class="section-icon" alt="">
          英雄圖鑑
        </h2>
        <div id="hero-pool-grid" class="hero-pool-grid">
          <!-- Populated by JS -->
        </div>
      </section>

      <section class="fragments-section">
        <h2 class="section-title">
          <img src="assets/gacha/icon_shard.png" class="section-icon" alt="">
          將魂碎片
        </h2>
        <div id="fragments-grid" class="fragments-grid">
          <!-- Populated by JS -->
        </div>
      </section>
    </main>

  </div>

  <!-- Hero detail overlay -->
  <div id="hero-detail-overlay" class="hero-detail-overlay hidden">
    <div class="hero-detail-box">
      <span id="hero-detail-rarity" class="hero-detail-rarity"></span>
      <img id="hero-detail-img" class="hero-detail-img" src="" alt="">
      <div id="hero-detail-name" class="hero-detail-name"></div>
      <div id="hero-detail-meta" class="hero-detail-meta"></div>
      <button class="btn-ghost hero-detail-close" id="btn-hero-detail-close">關閉</button>
    </div>
  </div>

  <!-- Draw result overlay -->
  <div id="result-overlay" class="gacha-result-overlay hidden">
    <div class="gacha-result-box">
      <div id="result-cards" class="result-cards"></div>
      <button class="btn-primary" id="btn-result-close">確認</button>
    </div>
  </div>

  <!-- Draw animation overlay -->
  <div id="draw-anim" class="draw-anim hidden">
    <div class="draw-anim-inner">✨ 召喚中… ✨</div>
  </div>

  <script type="module" src="js/gacha.js"></script>
</body>
</html>
