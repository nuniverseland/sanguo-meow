<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, orientation=landscape">
  <title>三國喵喵統治世界</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="index-page">

  <!-- Login Screen -->
  <div id="login-screen" class="screen active">
    <div class="logo-wrap">
      <img src="assets/ui/logo_title.png" alt="三國喵喵統治世界" class="logo"
           onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'">
      <h1 id="logo-text" style="display:none">三國喵喵統治世界</h1>
    </div>
    <div class="login-box">
      <h2>登入</h2>
      <input type="text" id="input-nickname" placeholder="暱稱（例：Keenu）" maxlength="10">
      <input type="text" id="input-birthday" placeholder="生日 MMDD（例：0301）" maxlength="4" pattern="\d{4}">
      <button id="btn-login" class="btn-primary">出發！🐾</button>
      <p class="login-hint">暱稱 + 生日會自動產生你的遊戲帳號</p>
    </div>
  </div>

  <!-- Stage Select Screen -->
  <div id="stage-screen" class="screen">
    <!-- Navbar -->
    <header class="top-bar">
      <span id="display-nickname" class="player-name" onclick="location.href='profile-celadon.html'" style="cursor:pointer;" title="個人檔案"></span>
      <span id="display-scrolls" class="scroll-display">🎴 0 卷</span>
      <span id="display-score" class="score-display">總分：0</span>
      <button id="btn-gacha" class="btn-gacha">🎴 抽卡</button>
      <button onclick="location.href='setup-team.html'" class="btn-secondary">⚔️ 隊伍編成</button>
      <button id="btn-heroes" onclick="location.href='heroes.html'" class="btn-secondary">📖 英雄圖鑑</button>
      <button id="btn-bestiary" onclick="location.href='bestiary.html'" class="btn-secondary">👾 敵人圖鑑</button>
      <a href="leaderboard.html" class="btn-secondary">排行榜 🏆</a>
      <button id="btn-logout" class="btn-ghost">登出</button>
    </header>

    <!-- 篇章 Tabs -->
    <div class="chapter-tabs" id="chapter-tabs">
      <button class="chapter-tab active" data-chapter="asia">🌏 亞洲篇</button>
      <button class="chapter-tab locked" data-chapter="europe" disabled>🌍 歐洲篇</button>
      <button class="chapter-tab locked" data-chapter="america" disabled>🌎 美洲篇</button>
      <button class="chapter-tab locked" data-chapter="space" disabled>🚀 宇宙</button>
      <button class="chapter-tab locked" data-chapter="final" disabled>⚔️ 終章</button>
    </div>

    <!-- 國家 Tabs -->
    <div class="country-tabs-wrap" id="country-tabs-wrap">
      <!-- Populated by JS -->
    </div>

    <!-- World Map with stage cards -->
    <div class="world-map" id="world-map">
      <div class="stage-list" id="stage-list">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Firebase + App Scripts -->
  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/index.js"></script>
</body>
</html>
