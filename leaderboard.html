<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, orientation=landscape">
  <title>三國喵喵 — 排行榜</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="leaderboard-page">

  <header class="top-bar">
    <button onclick="history.back()" class="btn-ghost">← 返回</button>
    <h1 class="page-title">🏆 排行榜</h1>
    <div class="tab-group">
      <button class="tab-btn active" data-tab="weekly">本週榜</button>
      <button class="tab-btn" data-tab="total">總榜</button>
    </div>
  </header>

  <div class="leaderboard-wrap">
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th>排名</th>
          <th>暱稱</th>
          <th>分數</th>
          <th>最遠關卡</th>
          <th>稱號</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <tr><td colspan="5" class="loading-row">載入中…</td></tr>
      </tbody>
    </table>
  </div>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/leaderboard.js"></script>
</body>
</html>
