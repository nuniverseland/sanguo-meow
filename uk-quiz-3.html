<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>憤怒的古堡 — Vocabulary Boss — 三國喵喵</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/adverbs-quiz.css">
</head>
<body class="quiz-page quiz-boss-page">

  <!-- Top bar -->
  <header class="quiz-topbar boss-topbar">
    <button class="btn-ghost" onclick="history.back()">← 返回</button>
    <span class="quiz-topbar-title">⚔️ BOSS — 憤怒的古堡 · Vocabulary Challenge</span>
    <span id="quiz-progress-text" class="quiz-progress-text">1 / 22</span>
  </header>

  <!-- Progress bar -->
  <div class="quiz-progress-bar-wrap">
    <div id="quiz-progress-bar" class="quiz-progress-bar boss-progress-bar" style="width:0%"></div>
  </div>

  <!-- Quiz card -->
  <main class="quiz-main">
    <div class="quiz-card boss-card" id="quiz-card">

      <!-- Word spotlight -->
      <div class="vocab-word-wrap">
        <span class="vocab-word-label">Target Word</span>
        <span id="vocab-word" class="vocab-word"></span>
        <span id="quiz-badge" class="quiz-badge badge-how">What's the word?</span>
      </div>

      <!-- Sentence with blank -->
      <div id="quiz-sentence" class="quiz-sentence france-sentence"></div>

      <!-- 4-option grid -->
      <div class="quiz-options vocab-options" id="quiz-options">
        <button class="quiz-option" data-idx="0"></button>
        <button class="quiz-option" data-idx="1"></button>
        <button class="quiz-option" data-idx="2"></button>
        <button class="quiz-option" data-idx="3"></button>
      </div>

      <!-- Explanation -->
      <div id="quiz-explain" class="quiz-explain hidden"></div>

      <!-- Next button -->
      <button id="quiz-next-btn" class="btn-primary quiz-next-btn hidden">Next →</button>

    </div>
  </main>

  <!-- Result overlay -->
  <div id="quiz-result" class="quiz-result hidden">
    <div class="quiz-result-box boss-result-box">
      <div id="quiz-result-emoji" class="quiz-result-emoji">🏰</div>
      <div id="quiz-result-title" class="quiz-result-title"></div>
      <div id="quiz-result-score" class="quiz-result-score"></div>
      <div id="quiz-result-msg" class="quiz-result-msg"></div>
      <div class="quiz-result-btns">
        <button class="btn-primary" id="quiz-retry-btn">再挑戰 🔁</button>
        <button class="btn-secondary" onclick="history.back()">返回選關</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/uk-quiz-3.js"></script>
</body>
</html>
